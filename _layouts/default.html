<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  {% if page.cover %}<meta property="og:image" content="{{ page.cover | absolute_url }}">{% endif %}
  <meta name="theme-color" content="#c2410c">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <p class="site-tagline">{{ site.description }}</p>
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>All days</a>
      <a href="{{ '/this-week/' | relative_url }}"{% if page.nav_id == 'week' %} class="active"{% endif %}>This week</a>
      <a href="{{ '/photos/' | relative_url }}"{% if page.nav_id == 'photos' %} class="active"{% endif %}>Photos</a>
      <a class="nav-carlo" href="{{ '/carlo/' | relative_url }}"{% if page.nav_id == 'carlo' %} class="active"{% endif %}>Carlo</a>
      <a class="nav-andrea" href="{{ '/andrea/' | relative_url }}"{% if page.nav_id == 'andrea' %} class="active"{% endif %}>Andrea</a>
    </nav>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>{{ site.title }} · <a href="{{ '/admin/' | relative_url }}">Write a post</a></p>
  </footer>
</body>
</html>
